name: npm Publish

on:
  repository_dispatch:
    types: [npm-publish]
  workflow_dispatch:
    inputs:
      releaseSha:
        description: "Release commit SHA to publish (defaults to latest default-branch commit)"
        required: false
        type: string

permissions:
  contents: read

env:
  CI: true

jobs:
  approve:
    name: Prepare npm publish
    runs-on: ubuntu-24.04
    concurrency:
      group: npm-publish-approval
      cancel-in-progress: true
    outputs:
      release_sha: ${{ steps.release-sha.outputs.value }}
      default_branch: ${{ steps.release-sha.outputs.default_branch }}
    steps:
      - name: Resolve release commit SHA
        id: release-sha
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const dispatchReleaseShaRaw = context.payload?.client_payload?.releaseSha;
            const manualReleaseShaRaw = context.payload?.inputs?.releaseSha;
            const payloadDefaultBranchRaw =
              context.payload?.repository?.default_branch;
            const dispatchReleaseSha =
              typeof dispatchReleaseShaRaw === "string"
                ? dispatchReleaseShaRaw.trim()
                : "";
            const manualReleaseSha =
              typeof manualReleaseShaRaw === "string"
                ? manualReleaseShaRaw.trim()
                : "";
            const payloadDefaultBranch =
              typeof payloadDefaultBranchRaw === "string"
                ? payloadDefaultBranchRaw.trim()
                : "";

            let releaseSha = dispatchReleaseSha || manualReleaseSha;
            let defaultBranch = payloadDefaultBranch;

            if (!defaultBranch) {
              const repoInfo = await github.rest.repos.get(context.repo);
              defaultBranch = repoInfo.data.default_branch;
            }

            if (!defaultBranch) {
              core.setFailed("Unable to determine repository default branch");
              return;
            }

            if (!releaseSha) {
              if (context.eventName === "repository_dispatch") {
                core.setFailed("repository_dispatch payload is missing releaseSha");
                return;
              }

              const ref = await github.rest.git.getRef({
                ...context.repo,
                ref: `heads/${defaultBranch}`,
              });

              releaseSha = ref.data.object.sha;
              core.info(
                `No release SHA provided; using ${defaultBranch} HEAD ${releaseSha}`,
              );
            }

            if (!/^[0-9a-f]{40}$/i.test(releaseSha)) {
              core.setFailed(
                `releaseSha must be a full 40-character commit SHA: ${releaseSha}`,
              );
              return;
            }

            core.setOutput("value", releaseSha);
            core.setOutput("default_branch", defaultBranch);

  cancel_pending:
    name: Cancel stale pending publishes
    needs: approve
    runs-on: ubuntu-24.04
    permissions:
      actions: write
      contents: read
    env:
      DEFAULT_BRANCH: ${{ needs.approve.outputs.default_branch }}
    steps:
      - name: Cancel older queued/waiting runs
        continue-on-error: true
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const currentRunId = context.runId;
            const currentRunNumber = context.runNumber;
            const defaultBranch = (process.env.DEFAULT_BRANCH || "").trim();
            const workflowRef = process.env.GITHUB_WORKFLOW_REF || "";

            const workflowPathMatch = workflowRef.match(
              /^[^/]+\/[^/]+\/(.+)@/,
            );
            const workflowPath = workflowPathMatch?.[1] ?? "";
            const workflowId = workflowPath.split("/").pop() || "";

            let runs = [];

            if (workflowId) {
              runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
                owner,
                repo,
                workflow_id: workflowId,
                per_page: 100,
              });
            } else {
              core.warning(
                "Unable to resolve workflow filename; using repository-wide workflow run list",
              );
              runs = await github.paginate(
                github.rest.actions.listWorkflowRunsForRepo,
                {
                  owner,
                  repo,
                  per_page: 100,
                },
              );
            }

            const candidates = runs.filter((run) => {
              if (run.id === currentRunId) return false;
              if (run.run_number >= currentRunNumber) return false;
              if (run.status === "completed") return false;
              if (workflowPath && run.path !== workflowPath) return false;
              if (defaultBranch && run.head_branch && run.head_branch !== defaultBranch) {
                return false;
              }
              if (
                run.event !== "repository_dispatch" &&
                run.event !== "workflow_dispatch"
              ) {
                return false;
              }

              return true;
            });

            let canceledCount = 0;

            for (const run of candidates) {
              const jobs = await github.paginate(
                github.rest.actions.listJobsForWorkflowRun,
                {
                  owner,
                  repo,
                  run_id: run.id,
                  per_page: 100,
                },
              );

              const publishJob = jobs.find((job) => job.name === "Publish to npm");

              if (publishJob?.status === "in_progress") {
                core.info(
                  `Keeping run ${run.id} because Publish to npm is in progress`,
                );
                continue;
              }

              try {
                await github.rest.actions.cancelWorkflowRun({
                  owner,
                  repo,
                  run_id: run.id,
                });
                canceledCount += 1;
                core.info(`Canceled stale pending run ${run.id}`);
              } catch (error) {
                core.warning(
                  `Unable to cancel run ${run.id}: ${error.message}`,
                );
              }
            }

            core.info(`Canceled ${canceledCount} stale pending run(s)`);

  publish:
    name: Publish to npm
    needs:
      - approve
      - cancel_pending
    environment: npm Publish
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      # Required for npm trusted publishing (OIDC) and dist-tag exchange tokens.
      id-token: write
    concurrency:
      group: npm-publish-exec
      cancel-in-progress: false
    env:
      RELEASE_SHA: ${{ needs.approve.outputs.release_sha }}
      DEFAULT_BRANCH: ${{ needs.approve.outputs.default_branch }}
    steps:

      - name: Checkout code repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_SHA }}

      - name: Install pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

      - name: Setup node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: 24
          # No cache - hardened against cache poisoning for sensitive publish operations
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate release commit is on default branch
        run: |
          if [ -z "$RELEASE_SHA" ]; then
            echo "Missing releaseSha" >&2
            exit 1
          fi

          if [ -z "$DEFAULT_BRANCH" ]; then
            echo "Missing default branch" >&2
            exit 1
          fi

          head_sha=$(git rev-parse HEAD)
          if [ "$head_sha" != "$RELEASE_SHA" ]; then
            echo "Checked out commit does not match releaseSha payload" >&2
            echo "HEAD=$head_sha" >&2
            echo "releaseSha=$RELEASE_SHA" >&2
            exit 1
          fi

          git fetch origin "$DEFAULT_BRANCH"
          origin_default_sha=$(git rev-parse "origin/$DEFAULT_BRANCH")
          if ! git merge-base --is-ancestor "$RELEASE_SHA" "origin/$DEFAULT_BRANCH"; then
            echo "releaseSha is not an ancestor of origin/$DEFAULT_BRANCH; refusing to publish" >&2
            echo "releaseSha=$RELEASE_SHA" >&2
            echo "origin/$DEFAULT_BRANCH SHA=$origin_default_sha" >&2
            exit 1
          fi

      - name: Resolve publish targets
        id: targets
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const fs = require("node:fs");
            const path = require("node:path");

            const delay = (ms) =>
              new Promise((resolve) => {
                setTimeout(resolve, ms);
              });

            const fetchNpmMetadata = async (packageName) => {
              const encodedName = encodeURIComponent(packageName);
              const url = `https://registry.npmjs.org/${encodedName}`;

              for (let attempt = 1; attempt <= 3; attempt += 1) {
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 15_000);

                try {
                  const response = await fetch(url, {
                    signal: controller.signal,
                  });

                  if (response.ok) {
                    return await response.json();
                  }

                  if (response.status === 404) {
                    return null;
                  }

                  const isRetryable =
                    response.status === 429 || response.status >= 500;
                  if (isRetryable && attempt < 3) {
                    await delay(attempt * 1_000);
                    continue;
                  }

                  throw new Error(`HTTP ${response.status}`);
                } catch (error) {
                  const isAbortError = error?.name === "AbortError";
                  const isNetworkError = error instanceof TypeError;
                  if ((isAbortError || isNetworkError) && attempt < 3) {
                    await delay(attempt * 1_000);
                    continue;
                  }

                  throw error;
                } finally {
                  clearTimeout(timeout);
                }
              }

              throw new Error("Unexpected npm metadata fetch failure");
            };

            const parseStableSemver = (value) => {
              if (typeof value !== "string") return null;
              const match = value.match(/^(\d+)\.(\d+)\.(\d+)$/);
              if (!match) return null;
              return match.slice(1).map((part) => Number(part));
            };

            const compareStableSemver = (a, b) => {
              const parsedA = parseStableSemver(a);
              const parsedB = parseStableSemver(b);
              if (!parsedA || !parsedB) return null;

              for (let index = 0; index < 3; index += 1) {
                if (parsedA[index] > parsedB[index]) return 1;
                if (parsedA[index] < parsedB[index]) return -1;
              }

              return 0;
            };

            const packagesDir = path.join(process.cwd(), "packages");
            const entries = fs.readdirSync(packagesDir, { withFileTypes: true });

            const prereleasePackages = [];
            const downgradePackages = [];
            const promotionTargets = [];
            const publishTargets = [];

            for (const entry of entries) {
              if (!entry.isDirectory()) continue;

              const manifestPath = path.join(packagesDir, entry.name, "package.json");
              if (!fs.existsSync(manifestPath)) continue;

              const manifest = JSON.parse(fs.readFileSync(manifestPath, "utf8"));
              if (manifest.private === true) continue;

              if (typeof manifest.version !== "string" || manifest.version.length === 0) {
                core.setFailed(`Package ${manifest.name} is missing a version`);
                return;
              }

              if (manifest.version.includes("-")) {
                prereleasePackages.push(`${manifest.name}@${manifest.version}`);
                continue;
              }

              const pkgName = manifest.name;
              const pkgVersion = manifest.version;
              let metadata = null;
              try {
                metadata = await fetchNpmMetadata(pkgName);
              } catch (error) {
                core.setFailed(
                  `Failed to query npm metadata for ${pkgName}: ${error.message}`,
                );
                return;
              }

              const latestTag = metadata?.["dist-tags"]?.latest ?? null;
              const hasVersion = Boolean(metadata?.versions?.[pkgVersion]);

              if (latestTag !== null) {
                const comparison = compareStableSemver(pkgVersion, latestTag);
                if (comparison === null) {
                  core.setFailed(
                    `Unsupported semver for ${pkgName}: local=${pkgVersion} latest=${latestTag}`,
                  );
                  return;
                }

                if (comparison < 0) {
                  downgradePackages.push(
                    `${pkgName} local=${pkgVersion} latest=${latestTag}`,
                  );
                  continue;
                }
              }

              if (latestTag !== pkgVersion) {
                const target = {
                  name: pkgName,
                  version: pkgVersion,
                  latestTag,
                };

                promotionTargets.push(target);
                if (!hasVersion) {
                  publishTargets.push(target);
                }
              }
            }

            if (prereleasePackages.length > 0) {
              core.setFailed(
                `Prerelease versions are not allowed on main: ${prereleasePackages.join(", ")}`,
              );
              return;
            }

            if (downgradePackages.length > 0) {
              core.setFailed(
                `Refusing to retag older versions as latest: ${downgradePackages.join(", ")}`,
              );
              return;
            }

            promotionTargets.sort((a, b) => a.name.localeCompare(b.name));
            publishTargets.sort((a, b) => a.name.localeCompare(b.name));

            core.info(
              `Promotion targets: ${promotionTargets.length === 0 ? "none" : promotionTargets.map((target) => `${target.name}@${target.version}`).join(", ")}`,
            );
            core.info(
              `Publish targets: ${publishTargets.length === 0 ? "none" : publishTargets.map((target) => `${target.name}@${target.version}`).join(", ")}`,
            );

            core.setOutput("promotionCount", String(promotionTargets.length));
            core.setOutput("publishCount", String(publishTargets.length));
            core.setOutput(
              "promotionTargetsJson",
              JSON.stringify(promotionTargets),
            );
            core.setOutput("publishTargetsJson", JSON.stringify(publishTargets));

      - name: Publish to npm and create GitHub releases
        if: steps.targets.outputs.publishCount != '0' && success()
        id: changesets-publish
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1.7.0
        with:
          publish: bash -eo pipefail -c "pnpm turbo build --filter='./packages/*' && changeset publish --tag next || (echo 'Publish failed; retrying once in 20 seconds (rebuild included for safety)...' >&2; sleep 20; pnpm turbo build --filter='./packages/*' && changeset publish --tag next)"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # NODE_AUTH_TOKEN is intentionally unset here.
          # npm trusted publishing uses GitHub OIDC (`id-token: write`).

      - name: Verify promotion targets exist on npm
        if: steps.targets.outputs.promotionCount != '0' && success()
        id: verify
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          TARGETS_JSON: ${{ steps.targets.outputs.promotionTargetsJson }}
        with:
          script: |
            const targets = JSON.parse(process.env.TARGETS_JSON || "[]");

            const delay = (ms) =>
              new Promise((resolve) => {
                setTimeout(resolve, ms);
              });

            const verifyDeadlineMs = Date.now() + 180_000;
            const propagationWaitMs = 10_000;

            const fetchNpmMetadata = async (packageName) => {
              const encodedName = encodeURIComponent(packageName);
              const url = `https://registry.npmjs.org/${encodedName}`;

              for (let attempt = 1; attempt <= 3; attempt += 1) {
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 15_000);

                try {
                  const response = await fetch(url, {
                    signal: controller.signal,
                  });

                  if (response.ok) {
                    return await response.json();
                  }

                  if (response.status === 404) {
                    return null;
                  }

                  const isRetryable =
                    response.status === 429 || response.status >= 500;
                  if (isRetryable && attempt < 3) {
                    await delay(attempt * 1_000);
                    continue;
                  }

                  throw new Error(`HTTP ${response.status}`);
                } catch (error) {
                  const isAbortError = error?.name === "AbortError";
                  const isNetworkError = error instanceof TypeError;
                  if ((isAbortError || isNetworkError) && attempt < 3) {
                    await delay(attempt * 1_000);
                    continue;
                  }

                  throw error;
                } finally {
                  clearTimeout(timeout);
                }
              }

              throw new Error("Unexpected npm metadata fetch failure");
            };

            let remaining = targets.map((target) => ({
              name: target.name,
              version: target.version,
            }));

            while (remaining.length > 0) {
              const missing = [];

              for (const target of remaining) {
                let metadata = null;
                try {
                  metadata = await fetchNpmMetadata(target.name);
                } catch (error) {
                  core.setFailed(
                    `Failed to verify npm metadata for ${target.name}: ${error.message}`,
                  );
                  return;
                }

                const hasVersion = Boolean(metadata?.versions?.[target.version]);
                if (!hasVersion) {
                  missing.push(target);
                }
              }

              if (missing.length === 0) {
                core.info("All promotion targets exist on npm.");
                return;
              }

              if (Date.now() >= verifyDeadlineMs) {
                remaining = missing;
                break;
              }

              core.info(
                `Waiting for npm propagation of ${missing.length} package(s): ${missing.map((target) => `${target.name}@${target.version}`).join(", ")}`,
              );
              await delay(propagationWaitMs);
              remaining = missing;
            }

            if (remaining.length > 0) {
              core.setFailed(
                `Missing published versions on npm after propagation wait: ${remaining.map((target) => `${target.name}@${target.version}`).join(", ")}`,
              );
              return;
            }

      - name: Release metadata reminder
        if: steps.targets.outputs.publishCount == '0' && steps.targets.outputs.promotionCount != '0' && success()
        run: |
          echo "::warning::No package publish was required for this run; if this is a recovery run, verify GitHub Releases exist for promoted versions."

      - name: Promote verified targets to latest
        if: steps.targets.outputs.promotionCount != '0' && success()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          TARGETS_JSON: ${{ steps.targets.outputs.promotionTargetsJson }}
        with:
          script: |
            const { execFileSync } = require("node:child_process");

            const targets = JSON.parse(process.env.TARGETS_JSON || "[]");
            const oidcRequestUrl = process.env.ACTIONS_ID_TOKEN_REQUEST_URL;
            const oidcRequestToken = process.env.ACTIONS_ID_TOKEN_REQUEST_TOKEN;

            if (!oidcRequestUrl || !oidcRequestToken) {
              core.setFailed("OIDC token request context is unavailable");
              return;
            }

            const delay = (ms) =>
              new Promise((resolve) => {
                setTimeout(resolve, ms);
              });

            const fetchWithRetry = async (url, options, contextLabel) => {
              for (let attempt = 1; attempt <= 3; attempt += 1) {
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 15_000);

                try {
                  const response = await fetch(url, {
                    ...options,
                    signal: controller.signal,
                  });

                  if (response.ok || response.status === 404) {
                    return response;
                  }

                  const isRetryable =
                    response.status === 429 || response.status >= 500;
                  if (isRetryable && attempt < 3) {
                    await delay(attempt * 1_000);
                    continue;
                  }

                  return response;
                } catch (error) {
                  const isAbortError = error?.name === "AbortError";
                  const isNetworkError = error instanceof TypeError;
                  if ((isAbortError || isNetworkError) && attempt < 3) {
                    await delay(attempt * 1_000);
                    continue;
                  }

                  throw new Error(
                    `${contextLabel} request failed: ${error.message}`,
                  );
                } finally {
                  clearTimeout(timeout);
                }
              }

              throw new Error(`${contextLabel} request failed unexpectedly`);
            };

            const audience = "npm:registry.npmjs.org";
            const oidcUrl = `${oidcRequestUrl}${oidcRequestUrl.includes("?") ? "&" : "?"}audience=${encodeURIComponent(audience)}`;

            let oidcResponse;
            try {
              oidcResponse = await fetchWithRetry(
                oidcUrl,
                {
                  headers: {
                    Authorization: `Bearer ${oidcRequestToken}`,
                  },
                },
                "GitHub OIDC token",
              );
            } catch (error) {
              core.setFailed(error.message);
              return;
            }

            if (!oidcResponse.ok) {
              core.setFailed(
                `Failed to fetch GitHub OIDC token: HTTP ${oidcResponse.status}`,
              );
              return;
            }

            const oidcPayload = await oidcResponse.json();
            const githubOidcToken = oidcPayload?.value;

            if (!githubOidcToken) {
              core.setFailed("GitHub OIDC response is missing token value");
              return;
            }

            const preflightReadyTargets = [];
            const preflightErrors = [];

            for (const target of targets) {
              const encodedName = encodeURIComponent(target.name);
              const exchangeUrl =
                `https://registry.npmjs.org/-/npm/v1/oidc/token/exchange/package/${encodedName}`;

              let exchangeResponse;
              try {
                exchangeResponse = await fetchWithRetry(
                  exchangeUrl,
                  {
                    method: "POST",
                    headers: {
                      Authorization: `Bearer ${githubOidcToken}`,
                    },
                  },
                  `npm OIDC exchange for ${target.name}`,
                );
              } catch (error) {
                preflightErrors.push(
                  `${target.name}@${target.version}: ${error.message}`,
                );
                continue;
              }

              if (!exchangeResponse.ok) {
                const hint =
                  exchangeResponse.status === 404
                    ? " (check npm trusted publisher configuration for this package/workflow)"
                    : exchangeResponse.status === 401
                      ? " (check GitHub OIDC permissions and npm trusted publisher setup)"
                      : "";
                preflightErrors.push(
                  `${target.name}@${target.version}: OIDC exchange failed (HTTP ${exchangeResponse.status})${hint}`,
                );
                continue;
              }

              const exchangePayload = await exchangeResponse.json();
              const npmToken = exchangePayload?.token;

              if (!npmToken) {
                preflightErrors.push(
                  `${target.name}@${target.version}: OIDC exchange response is missing token`,
                );
                continue;
              }

              preflightReadyTargets.push({
                ...target,
                npmToken,
              });
            }

            if (preflightErrors.length > 0) {
              core.setFailed(
                `OIDC preflight failed; refusing to promote any package to latest: ${preflightErrors.join(" | ")}`,
              );
              return;
            }

            for (const target of preflightReadyTargets) {
              const spec = `${target.name}@${target.version}`;
              execFileSync(
                "npm",
                [
                  "dist-tag",
                  "add",
                  spec,
                  "latest",
                  "--registry",
                  "https://registry.npmjs.org",
                ],
                {
                  stdio: "inherit",
                  env: {
                    ...process.env,
                    NODE_AUTH_TOKEN: target.npmToken,
                  },
                },
              );
            }

      - name: No promotion targets
        if: steps.targets.outputs.promotionCount == '0' && success()
        run: echo "No packages require promotion to latest for this release SHA."

      - name: Recovery guidance
        if: failure()
        run: |
          echo "::error::Publish failed for release SHA ${RELEASE_SHA}."
          echo "::error::Rerun this workflow run, or run workflow_dispatch with releaseSha=${RELEASE_SHA}."
