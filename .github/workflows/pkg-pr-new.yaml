name: pkg.pr.new

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  publish-preview:
    name: Publish Package Previews
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout code repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # ratchet:pnpm/action-setup@v6.0.9

      - name: Setup node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # ratchet:actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm turbo build --filter="./packages/*"

      - name: Collect public packages
        id: public-packages
        run: |
          packages="$(
            node --input-type=module <<'EOF'
          import { existsSync, readFileSync, readdirSync } from "node:fs";
          import { join } from "node:path";

          const packageDirs = readdirSync("packages", { withFileTypes: true })
            .filter((entry) => entry.isDirectory())
            .map((entry) => `packages/${entry.name}`)
            .filter((dir) => existsSync(join(dir, "package.json")))
            .filter((dir) => {
              const pkg = JSON.parse(
                readFileSync(join(dir, "package.json"), "utf8"),
              );
              return pkg.private !== true;
            })
            .sort();

          console.log(packageDirs.join("\n"));
          EOF
          )"

          if [ -z "$packages" ]; then
            echo "::error::No public packages found under packages/*."
            exit 1
          fi

          echo "paths<<EOF" >> "$GITHUB_OUTPUT"
          printf "%s\n" "$packages" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          echo "Publishing previews for:"
          printf "%s\n" "$packages"

      - name: Publish PR previews
        env:
          PACKAGE_PATHS: ${{ steps.public-packages.outputs.paths }}
        run: |
          mapfile -t package_paths <<< "$PACKAGE_PATHS"
          pnpm exec pkg-pr-new publish \
            --comment=update \
            --packageManager=pnpm \
            "${package_paths[@]}"
