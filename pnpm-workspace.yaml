packages:
  - packages/*
  - examples/*
  - apps/*
  - templates/*

linkWorkspacePackages: true
preferWorkspacePackages: true
publicHoistPattern:
  - '@types/*'

overrides:
  '@opentelemetry/core': 2.8.0
  '@tootallnate/once': 2.0.1
  dompurify: 3.4.11
  js-yaml: 4.2.0
  postcss: 8.5.15
  tar: 7.5.16
  '@earendil-works/pi-coding-agent>undici': 8.5.0
  uuid: 11.1.1

strictDepBuilds: true

verifyDepsBeforeRun: install

minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - '@assistant-ui/*'
  - assistant-cloud
  - assistant-stream
  - assistant-ui
  - create-assistant-ui
  - eve
  - heat-graph
  - safe-content-frame
  - tw-glass
  - tw-shimmer

allowBuilds:
  '@clerk/shared': false
  '@google/genai': false
  '@modelcontextprotocol/ext-apps': false
  '@mongodb-js/zstd': false
  '@parcel/watcher': false
  '@tailwindcss/oxide': false
  core-js: false
  esbuild@0.25.12: true
  esbuild@0.27.7: true
  esbuild@0.28.0: true
  esbuild@0.28.1: true
  msgpackr-extract: true
  node-liblzma: false
  protobufjs: false
  react-grab: false
  sharp@0.34.5: true
  sqlite3@5.1.7: true
