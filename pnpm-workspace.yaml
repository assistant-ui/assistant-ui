packages:
  - packages/*
  - examples/*
  - apps/*
  - templates/*

linkWorkspacePackages: true
preferWorkspacePackages: true
publicHoistPattern:
  - '@types/*'

strictDepBuilds: true

verifyDepsBeforeRun: install

minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - '@assistant-ui/*'
  - assistant-cloud
  - assistant-stream
  - assistant-ui
  - create-assistant-ui
  - heat-graph
  - mcp-app-studio
  - safe-content-frame
  - tw-glass
  - tw-shimmer

allowBuilds:
  '@clerk/shared': true
  '@google/genai': false
  '@modelcontextprotocol/ext-apps': false
  '@mongodb-js/zstd': false
  '@tailwindcss/oxide': true
  core-js: true
  esbuild: true
  msgpackr-extract: true
  node-liblzma: false
  protobufjs: true
  react-grab: true
  sharp: true
  sqlite3: true
